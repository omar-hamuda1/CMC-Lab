services:
  redis-node1:
    image: redis:7
    container_name: redis-node1
    ports:
      - "6379:6379"
    command: redis-server --requirepass "" --masterauth ""

  redis-node2:
    image: redis:7
    container_name: redis-node2
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-node1 6379 --requirepass "" --masterauth ""
    depends_on:
      - redis-node1

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    command:
      - etcd
      - --name=etcd0
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://0.0.0.0:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=lab2-token